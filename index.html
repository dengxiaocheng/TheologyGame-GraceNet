<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>恩典之网</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="hud" class="hud">
    <div id="hudLevel" class="hud-level"></div>
    <div id="hudStatus" class="hud-status"></div>
  </div>

  <div id="hint" class="hint"></div>

  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <div id="modalTitle" class="modal-title"></div>
      <div id="modalBody" class="modal-body"></div>
      <button id="modalBtn" class="modal-btn">继续</button>
    </div>
  </div>

  <div id="levelTitle" class="level-title hidden">
    <div id="levelTitleMain" class="level-title-main"></div>
    <div id="levelTitleSub" class="level-title-sub"></div>
  </div>

  <!-- 按依赖顺序加载 -->
  <script src="js/animation.js"></script>
  <script src="js/canvas-engine.js"></script>
  <script src="js/rules.js"></script>
  <script src="js/node-system.js"></script>
  <script src="js/edge-system.js"></script>
  <script src="js/grace-flow.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
